<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOLC-I Tracker Completo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#111113;--card:#18181B;--card2:#1E1E22;--card3:#232329;
  --border:#2A2A30;--border2:#333340;
  --text:#EDEDF0;--muted:#72727A;--muted2:#9999A6;
  --math:#F97316;--science:#22D3EE;--logic:#A78BFA;--sim:#34D399;--accent:#FACC15;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;padding:16px 14px 80px;max-width:720px;margin:0 auto;font-size:14px;line-height:1.6;}
/* HEADER */
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
h1{font-size:clamp(20px,5vw,28px);font-weight:700;line-height:1.2;margin-bottom:4px;}
.sub{color:var(--muted2);font-size:13px;margin-bottom:24px;}
/* PROGRESS */
.prog-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:22px;}
.prog-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.prog-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}
.prog-cnt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);}
.bar-track{height:5px;background:var(--border2);border-radius:99px;overflow:hidden;margin-bottom:14px;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--sim));border-radius:99px;transition:width .4s;}
.sec-bars{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbi{display:flex;flex-direction:column;gap:4px;}
.sbi-lbl{display:flex;justify-content:space-between;font-size:11px;}
.sbi-name{color:var(--muted2);}
.sbi-pct{font-family:'JetBrains Mono',monospace;font-size:10px;}
.mini-track{height:3px;background:var(--border2);border-radius:99px;overflow:hidden;}
.mini-fill{height:100%;border-radius:99px;transition:width .4s;}
/* PHASE */
.phase{margin-bottom:14px;}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;user-select:none;transition:border-color .2s;}
.phase-hdr:hover{border-color:var(--border2);}
.phase-hdr.open{border-radius:10px 10px 0 0;border-bottom-color:transparent;}
.phase-left{display:flex;align-items:center;gap:10px;}
.phase-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.phase-title{font-weight:600;font-size:14px;}
.phase-meta{display:flex;align-items:center;gap:8px;}
.phase-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.phase-pct{font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 7px;border-radius:5px;background:var(--card2);color:var(--muted2);min-width:40px;text-align:center;}
.chevron{color:var(--muted);font-size:11px;transition:transform .25s;}
.phase-hdr.open .chevron{transform:rotate(180deg);}
.phase-body{display:none;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.phase-body.open{display:block;}
/* SUBJECT */
.subj-group{border-bottom:1px solid var(--border);}
.subj-group:last-child{border-bottom:none;}
.subj-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px 8px;}
.subj-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;}
.subj-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);}
.subj-prog{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
/* MODULE */
.module{border-bottom:1px solid var(--border);}
.module:last-child{border-bottom:none;}
.mod-hdr{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;transition:background .15s;}
.mod-hdr:hover{background:var(--card2);}
.mod-check{width:17px;height:17px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.mod-check.checked{background:var(--sim);border-color:var(--sim);}
.mod-check.checked::after{content:'тЬУ';color:#000;font-size:10px;font-weight:700;}
.mod-title{font-size:13px;font-weight:500;flex:1;}
.mod-title.done{text-decoration:line-through;color:var(--muted);}
.mod-chev{font-size:10px;color:var(--muted);transition:transform .2s;}
.mod-chev.open{transform:rotate(180deg);}
/* LESSON */
.lessons{display:none;flex-direction:column;}
.lessons.open{display:flex;}
.lesson{border-bottom:1px solid var(--border);cursor:pointer;}
.lesson:last-child{border-bottom:none;}
.lesson-top{display:flex;align-items:center;gap:9px;padding:8px 14px 8px 32px;transition:background .15s;}
.lesson-top:hover{background:var(--card2);}
.les-check{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.les-check.checked{background:var(--sim);border-color:var(--sim);}
.les-check.checked::after{content:'тЬУ';color:#000;font-size:8px;font-weight:700;}
.les-info{flex:1;}
.les-title{font-size:12px;font-weight:500;line-height:1.4;}
.les-title.done{text-decoration:line-through;color:var(--muted);}
.les-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;}
.tag-teoria{background:rgba(250,204,21,.12);color:var(--accent);}
.tag-esercizi{background:rgba(34,211,238,.12);color:var(--science);}
.tag-quiz{background:rgba(167,139,250,.15);color:var(--logic);}
.tag-sim{background:rgba(52,211,153,.15);color:var(--sim);}
/* CONTENT PANEL */
.les-content{display:none;padding:12px 14px 14px 46px;background:var(--card3);border-top:1px solid var(--border);}
.les-content.open{display:block;}
.content-block{margin-bottom:14px;}
.content-block:last-child{margin-bottom:0;}
.cb-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;}
.teoria-text{font-size:12px;color:#ccc;line-height:1.7;}
.teoria-text strong{color:var(--text);}
.formula-box{background:#0D0D0F;border:1px solid var(--border2);border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);line-height:1.8;margin:8px 0;}
.esercizi-list{display:flex;flex-direction:column;gap:8px;}
.esercizio{background:var(--card2);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.ez-q{padding:9px 12px;font-size:12px;cursor:pointer;user-select:none;display:flex;align-items:flex-start;gap:8px;}
.ez-q:hover{background:#26262e;}
.ez-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;margin-top:1px;}
.ez-text{flex:1;line-height:1.5;}
.ez-reveal{font-size:9px;color:var(--muted);flex-shrink:0;margin-top:2px;}
.ez-answer{display:none;padding:8px 12px 10px 32px;border-top:1px solid var(--border);font-size:12px;background:#0D0D0F;}
.ez-answer.open{display:block;}
.answer-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.answer-text{color:#bbb;line-height:1.6;}
.answer-text strong{color:var(--sim);}
/* TIP */
.tip-box{background:rgba(250,204,21,.06);border:1px solid rgba(250,204,21,.2);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--muted2);margin:10px 14px 12px;}
.tip-box strong{color:var(--accent);}
/* RESET */
.reset-btn{display:block;margin:28px auto 0;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:8px 18px;border-radius:6px;cursor:pointer;transition:all .2s;}
.reset-btn:hover{border-color:var(--logic);color:var(--logic);}
</style>
</head>
<body>

<div class="eyebrow">Design del Prodotto Industriale ┬╖ Unibo Bologna</div>
<h1>TOLC-I Study Tracker</h1>
<div class="sub">Settembre 2026 ┬╖ Tutto il materiale ├и qui dentro тАФ nessun link esterno</div>

<div class="prog-wrap">
  <div class="prog-hdr"><span class="prog-lbl">Progresso totale</span><span class="prog-cnt" id="total-cnt">0 / 0</span></div>
  <div class="bar-track"><div class="bar-fill" id="total-bar" style="width:0%"></div></div>
  <div class="sec-bars">
    <div class="sbi"><div class="sbi-lbl"><span class="sbi-name" style="color:var(--math)">Matematica</span><span class="sbi-pct" id="pct-math" style="color:var(--math)">0%</span></div><div class="mini-track"><div class="mini-fill" id="bar-math" style="background:var(--math);width:0%"></div></div></div>
    <div class="sbi"><div class="sbi-lbl"><span class="sbi-name" style="color:var(--science)">Scienze</span><span class="sbi-pct" id="pct-science" style="color:var(--science)">0%</span></div><div class="mini-track"><div class="mini-fill" id="bar-science" style="background:var(--science);width:0%"></div></div></div>
    <div class="sbi"><div class="sbi-lbl"><span class="sbi-name" style="color:var(--logic)">Logica</span><span class="sbi-pct" id="pct-logic" style="color:var(--logic)">0%</span></div><div class="mini-track"><div class="mini-fill" id="bar-logic" style="background:var(--logic);width:0%"></div></div></div>
    <div class="sbi"><div class="sbi-lbl"><span class="sbi-name" style="color:var(--sim)">Simulazioni</span><span class="sbi-pct" id="pct-sim" style="color:var(--sim)">0%</span></div><div class="mini-track"><div class="mini-fill" id="bar-sim" style="background:var(--sim);width:0%"></div></div></div>
  </div>
</div>

<div id="root"></div>
<button class="reset-btn" onclick="resetAll()">тЖ║ Reset progresso</button>

<script>
const PHASES = [
{id:"f1",title:"Fase 1 тАФ Matematica",date:"Giu тЖТ 6 Lug",color:"var(--math)",cat:"math",tip:"<strong>Regola d'oro:</strong> dopo ogni lezione fai subito gli esercizi. Non passare al modulo successivo se gli esercizi ti sembrano ancora difficili.",subjects:[
{name:"Aritmetica & Algebra",modules:[
{title:"Numeri: interi, razionali, reali",lessons:[
{title:"Teoria: tipi di numeri e operazioni",tag:"teoria",teoria:`I numeri si dividono in famiglie: <strong>interi</strong> (тАжтИТ2, тИТ1, 0, 1, 2тАж), <strong>razionali</strong> (frazioni come 3/4, тИТ2/5) e <strong>reali</strong> (includono anche тИЪ2, ╧АтАж).<br><br><strong>Valore assoluto:</strong> |x| ├и la distanza di x dallo zero. |тИТ5| = 5, |3| = 3.<br><br><strong>Propriet├а delle operazioni:</strong><br>тАв Commutativa: a+b = b+a, a├Чb = b├Чa<br>тАв Associativa: (a+b)+c = a+(b+c)<br>тАв Distributiva: a├Ч(b+c) = a├Чb + a├Чc`,formule:["Valore assoluto: |x| = x se xтЙе0, |x| = тИТx se x<0","Regola dei segni: (тИТ)├Ч(тИТ) = (+), (+)├Ч(тИТ) = (тИТ)"],esercizi:[{q:"Calcola: |тИТ7| + |3| тИТ |тИТ2|",a:"= 7 + 3 тИТ 2 = <strong>8</strong>"},{q:"Quale dei seguenti ├и un numero razionale? тИЪ2, ╧А, тИТ3/7, тИЪ3",a:"<strong>тИТ3/7</strong> ├и razionale perch├й ├и una frazione di interi. тИЪ2, ╧А, тИЪ3 sono irrazionali."},{q:"Calcola: (тИТ3) ├Ч (тИТ4) + (тИТ2) ├Ч 5",a:"= (+12) + (тИТ10) = <strong>2</strong>"}]},
{title:"Teoria: frazioni тАФ operazioni",tag:"teoria",teoria:`<strong>Somma/differenza:</strong> porta allo stesso denominatore (m.c.m.).<br>Esempio: 1/3 + 1/4 тЖТ m.c.m.=12 тЖТ 4/12 + 3/12 = 7/12<br><br><strong>Moltiplicazione:</strong> numeratore ├Ч numeratore, denominatore ├Ч denominatore.<br>2/3 ├Ч 3/5 = 6/15 = 2/5<br><br><strong>Divisione:</strong> moltiplica per il reciproco.<br>2/3 ├╖ 4/5 = 2/3 ├Ч 5/4 = 10/12 = 5/6<br><br><strong>Semplificazione:</strong> dividi numeratore e denominatore per il loro M.C.D.`,formule:["a/b + c/d = (ad + bc) / bd","a/b ├Ч c/d = ac / bd","a/b ├╖ c/d = a/b ├Ч d/c"],esercizi:[{q:"Calcola: 2/3 + 3/4",a:"m.c.m.(3,4)=12 тЖТ 8/12 + 9/12 = <strong>17/12</strong>"},{q:"Calcola: (5/6) ├╖ (10/3)",a:"= 5/6 ├Ч 3/10 = 15/60 = <strong>1/4</strong>"},{q:"Semplifica: 36/48",a:"M.C.D.(36,48)=12 тЖТ <strong>3/4</strong>"}]},
{title:"Esercizi misti su numeri",tag:"esercizi",esercizi:[{q:"Ordina dal minore al maggiore: тИТ3/2, 0.7, тИТ0.5, 4/3",a:"Converti: тИТ1.5, 0.7, тИТ0.5, 1.333тАж тЖТ Ordine: <strong>тИТ3/2, тИТ0.5, 0.7, 4/3</strong>"},{q:"Calcola: (тИТ2)┬│ тИТ |тИТ8| + (тИТ1)тБ░",a:"= тИТ8 тИТ 8 + 1 = <strong>тИТ15</strong>"},{q:"Vero o falso: ogni numero intero ├и anche razionale?",a:"<strong>Vero.</strong> Gli interi sono un sottoinsieme dei razionali (es. 5 = 5/1)."}]}
]},
{title:"Potenze, radici e logaritmi",lessons:[
{title:"Teoria: potenze e regole",tag:"teoria",teoria:`Una potenza aтБ┐ significa moltiplicare a per se stesso n volte.<br><br><strong>Regole fondamentali:</strong><br>тАв aс╡Р ├Ч aтБ┐ = aс╡РтБ║тБ┐ (stessa base тЖТ somma esponenti)<br>тАв aс╡Р ├╖ aтБ┐ = aс╡РтБ╗тБ┐<br>тАв (aс╡Р)тБ┐ = aс╡Р╦гтБ┐<br>тАв (a├Чb)тБ┐ = aтБ┐ ├Ч bтБ┐<br>тАв aтБ░ = 1 (qualsiasi a тЙа 0)<br>тАв aтБ╗тБ┐ = 1/aтБ┐<br>тАв a^(1/n) = тБ┐тИЪa`,formule:["aс╡Р ├Ч aтБ┐ = aс╡РтБ║тБ┐","(aс╡Р)тБ┐ = aс╡РтБ┐","aтБ╗тБ┐ = 1/aтБ┐","a^(1/2) = тИЪa"],esercizi:[{q:"Semplifica: 2┬│ ├Ч 2тБ┤ ├╖ 2┬▓",a:"= 2^(3+4тИТ2) = 2тБ╡ = <strong>32</strong>"},{q:"Calcola: (3┬▓)┬│",a:"= 3^(2├Ч3) = 3тБ╢ = <strong>729</strong>"},{q:"Quanto vale 4^(1/2)?",a:"4^(1/2) = тИЪ4 = <strong>2</strong>"}]},
{title:"Teoria: logaritmi",tag:"teoria",teoria:`Il logaritmo risponde alla domanda: <em>a quale potenza devo elevare la base per ottenere quel numero?</em><br><br>log_b(x) = y significa b╩╕ = x<br><br>Esempio: log_2(8) = 3 perch├й 2┬│ = 8<br><br><strong>Propriet├а:</strong><br>тАв log(a├Чb) = log(a) + log(b)<br>тАв log(a/b) = log(a) тИТ log(b)<br>тАв log(aтБ┐) = n ├Ч log(a)<br>тАв log_b(b) = 1<br>тАв log_b(1) = 0<br><br><strong>log naturale ln:</strong> base e тЙИ 2.718`,formule:["log_b(xy) = log_b(x) + log_b(y)","log_b(x/y) = log_b(x) тИТ log_b(y)","log_b(xтБ┐) = n┬╖log_b(x)","log_b(b) = 1  |  log_b(1) = 0"],esercizi:[{q:"Calcola: log_3(81)",a:"3^? = 81 = 3тБ┤ тЖТ log_3(81) = <strong>4</strong>"},{q:"Semplifica: log_2(16) тИТ log_2(4)",a:"= log_2(16/4) = log_2(4) = <strong>2</strong>"},{q:"Risolvi: 2^x = 32",a:"32 = 2тБ╡ тЖТ <strong>x = 5</strong>"}]}
]},
{title:"Polinomi e fattorizzazione",lessons:[
{title:"Teoria: operazioni con polinomi",tag:"teoria",teoria:`Un <strong>polinomio</strong> ├и una somma di monomi (es. 3x┬▓ тИТ 2x + 1).<br><br><strong>Somma/differenza:</strong> somma i termini simili (stesso grado).<br>(2x┬▓ + 3x) + (x┬▓ тИТ x) = 3x┬▓ + 2x<br><br><strong>Prodotti notevoli da memorizzare:</strong><br>тАв (a+b)┬▓ = a┬▓ + 2ab + b┬▓<br>тАв (aтИТb)┬▓ = a┬▓ тИТ 2ab + b┬▓<br>тАв (a+b)(aтИТb) = a┬▓ тИТ b┬▓<br>тАв (a+b)┬│ = a┬│ + 3a┬▓b + 3ab┬▓ + b┬│`,formule:["(a+b)┬▓ = a┬▓ + 2ab + b┬▓","(aтИТb)┬▓ = a┬▓ тИТ 2ab + b┬▓","(a+b)(aтИТb) = a┬▓ тИТ b┬▓"],esercizi:[{q:"Espandi: (x + 3)┬▓",a:"= x┬▓ + 2┬╖x┬╖3 + 3┬▓ = <strong>x┬▓ + 6x + 9</strong>"},{q:"Espandi: (2x тИТ 1)(2x + 1)",a:"= (2x)┬▓ тИТ 1┬▓ = <strong>4x┬▓ тИТ 1</strong>"},{q:"Semplifica: (x┬▓ + 4x + 4) / (x + 2)",a:"Nota: x┬▓ + 4x + 4 = (x+2)┬▓ тЖТ risultato: <strong>x + 2</strong>"}]},
{title:"Teoria: fattorizzazione",tag:"teoria",teoria:`Fattorizzare = scrivere un polinomio come prodotto di fattori pi├╣ semplici.<br><br><strong>Tecniche principali:</strong><br>1. <strong>Raccoglimento a fattor comune:</strong> 6x┬▓ + 4x = 2x(3x + 2)<br>2. <strong>Differenza di quadrati:</strong> x┬▓ тИТ 9 = (x+3)(xтИТ3)<br>3. <strong>Quadrato di binomio:</strong> x┬▓ + 6x + 9 = (x+3)┬▓<br>4. <strong>Trinomio:</strong> x┬▓ + 5x + 6 = (x+2)(x+3) тЖТ cerca a,b con a+b=5, a├Чb=6`,formule:["x┬▓ тИТ b┬▓ = (x+b)(xтИТb)","x┬▓ + (a+b)x + ab = (x+a)(x+b)"],esercizi:[{q:"Fattorizza: x┬▓ тИТ 25",a:"= x┬▓ тИТ 5┬▓ = <strong>(x+5)(xтИТ5)</strong>"},{q:"Fattorizza: x┬▓ + 7x + 12",a:"Cerca a,b: a+b=7, ab=12 тЖТ a=3, b=4 тЖТ <strong>(x+3)(x+4)</strong>"},{q:"Fattorizza: 3x┬│ тИТ 9x",a:"Fattor comune 3x: <strong>3x(x┬▓ тИТ 3)</strong>"}]},
{title:"Quiz polinomi",tag:"quiz",esercizi:[{q:"Quanto vale (aтИТb)┬▓ se a=5, b=2?",a:"(5тИТ2)┬▓ = 3┬▓ = <strong>9</strong>"},{q:"Fattorizza: 4x┬▓ тИТ 12x + 9",a:"= (2x)┬▓ тИТ 2┬╖2x┬╖3 + 3┬▓ = <strong>(2xтИТ3)┬▓</strong>"},{q:"Moltiplica: (x+2)(x┬▓тИТ2x+4)",a:"= x┬│тИТ2x┬▓+4x+2x┬▓тИТ4x+8 = <strong>x┬│+8</strong> (somma di cubi)"}]}
]},
{title:"Equazioni e disequazioni",lessons:[
{title:"Teoria: equazioni 1┬░ e 2┬░ grado",tag:"teoria",teoria:`<strong>Equazione di 1┬░ grado:</strong> ax + b = 0 тЖТ x = тИТb/a<br>Esempio: 3x тИТ 6 = 0 тЖТ x = 2<br><br><strong>Equazione di 2┬░ grado:</strong> ax┬▓ + bx + c = 0<br><strong>Formula risolutiva (quadratica):</strong><br>x = (тИТb ┬▒ тИЪ(b┬▓тИТ4ac)) / 2a<br><br><strong>Discriminante ╬Ф = b┬▓тИТ4ac:</strong><br>тАв ╬Ф > 0 тЖТ 2 soluzioni reali distinte<br>тАв ╬Ф = 0 тЖТ 1 soluzione doppia: x = тИТb/2a<br>тАв ╬Ф < 0 тЖТ nessuna soluzione reale`,formule:["x = (тИТb ┬▒ тИЪ╬Ф) / 2a","╬Ф = b┬▓ тИТ 4ac","Formule di Vi├иte: xтВБ+xтВВ = тИТb/a  |  xтВБ┬╖xтВВ = c/a"],esercizi:[{q:"Risolvi: 2x┬▓ тИТ 5x + 3 = 0",a:"╬Ф = 25тИТ24 = 1 тЖТ x = (5┬▒1)/4 тЖТ <strong>xтВБ=3/2, xтВВ=1</strong>"},{q:"Risolvi: x┬▓ тИТ 4 = 0",a:"x┬▓ = 4 тЖТ <strong>x = ┬▒2</strong>"},{q:"Quante soluzioni ha x┬▓ + x + 1 = 0?",a:"╬Ф = 1тИТ4 = тИТ3 < 0 тЖТ <strong>nessuna soluzione reale</strong>"}]},
{title:"Teoria: disequazioni",tag:"teoria",teoria:`Risolvere una disequazione significa trovare l'intervallo di valori che la soddisfa.<br><br><strong>1┬░ grado:</strong> come equazioni ma con тЙд тЙе < ><br>тЪая╕П Se moltiplichi/dividi per un numero <strong>negativo</strong>, il verso si inverte!<br><br><strong>2┬░ grado ax┬▓+bx+c > 0:</strong><br>Se ╬Ф>0, trova le radici xтВБ < xтВВ (con formula)<br>тАв Se a>0: soluzione ├и x<xтВБ oppure x>xтВВ (archi esterni, forma a "U")<br>тАв Se a>0 e vuoi ax┬▓+bx+c < 0: xтВБ < x < xтВВ (arco interno)`,formule:["ax+b > 0 тЖТ x > тИТb/a (se a>0)","ax┬▓+bx+c > 0 con a>0, ╬Ф>0 тЖТ x<xтВБ тИк x>xтВВ"],esercizi:[{q:"Risolvi: 2x тИТ 6 > 0",a:"2x > 6 тЖТ <strong>x > 3</strong>"},{q:"Risolvi: тИТ3x + 9 тЙд 0",a:"тИТ3x тЙд тИТ9 тЖТ dividi per тИТ3 (inverti): <strong>x тЙе 3</strong>"},{q:"Risolvi: x┬▓ тИТ 4 > 0",a:"radici: x=┬▒2 тЖТ con a=1>0, soluzione esterna: <strong>x<тИТ2 тИк x>2</strong>"}]},
{title:"Sistemi di equazioni",tag:"teoria",teoria:`Un sistema di equazioni chiede valori che soddisfino tutte le equazioni contemporaneamente.<br><br><strong>Metodo di sostituzione:</strong> ricava x dalla prima, sostituisci nella seconda.<br><strong>Metodo di addizione:</strong> moltiplica le equazioni per annullare una variabile.<br><br>Esempio:<br>{ x + y = 5<br>{ x тИТ y = 1<br>Somma: 2x = 6 тЖТ x = 3 тЖТ y = 2`,formule:["Gauss: moltiplica e somma le equazioni per eliminare una variabile"],esercizi:[{q:"Risolvi: { 2x + y = 7 | x тИТ y = 2",a:"Somma: 3x = 9 тЖТ x=3 тЖТ y=1 тЖТ <strong>(3, 1)</strong>"},{q:"Risolvi: { x + 2y = 5 | 3x тИТ y = 1",a:"Dalla 1┬к: x=5тИТ2y тЖТ nella 2┬к: 3(5тИТ2y)тИТy=1 тЖТ 15тИТ7y=1 тЖТ y=2, x=1 тЖТ <strong>(1, 2)</strong>"}]},
{title:"Quiz equazioni e disequazioni",tag:"quiz",esercizi:[{q:"Risolvi: (xтИТ2)(x+3) = 0",a:"Prodotto = 0 тЖТ <strong>x=2 oppure x=тИТ3</strong>"},{q:"Risolvi: |2xтИТ1| = 5",a:"2xтИТ1=5 тЖТ x=3  oppure  2xтИТ1=тИТ5 тЖТ x=тИТ2 тЖТ <strong>x=3 o x=тИТ2</strong>"},{q:"Per quali x vale x┬▓ тЙд 9?",a:"x┬▓тИТ9 тЙд 0 тЖТ (xтИТ3)(x+3) тЙд 0 тЖТ <strong>тИТ3 тЙд x тЙд 3</strong>"}]}
]}
]},
{name:"Geometria",modules:[
{title:"Geometria piana",lessons:[
{title:"Teoria: figure piane fondamentali",tag:"teoria",teoria:`<strong>Triangoli:</strong><br>тАв Somma angoli interni = 180┬░<br>тАв Area = (base ├Ч altezza) / 2<br>тАв Pitagora (rettangolo): a┬▓ + b┬▓ = c┬▓ (c=ipotenusa)<br><br><strong>Quadrilateri:</strong><br>тАв Rettangolo: A = base ├Ч altezza<br>тАв Quadrato: A = lato┬▓<br>тАв Parallelogramma: A = base ├Ч altezza<br>тАв Trapezio: A = (bтВБ+bтВВ)/2 ├Ч altezza<br><br><strong>Cerchio:</strong> Area = ╧Аr┬▓, Circonferenza = 2╧Аr`,formule:["Pitagora: c┬▓ = a┬▓ + b┬▓","Cerchio: A = ╧Аr┬▓  |  C = 2╧Аr","Trapezio: A = (bтВБ+bтВВ)/2 ├Ч h"],esercizi:[{q:"Un triangolo rettangolo ha cateti 3 e 4. Quanto misura l'ipotenusa?",a:"c┬▓ = 9+16 = 25 тЖТ c = <strong>5</strong>"},{q:"Area di un trapezio con basi 6 e 10, altezza 4?",a:"A = (6+10)/2 ├Ч 4 = 8 ├Ч 4 = <strong>32</strong>"},{q:"Circonferenza di un cerchio con r=7?",a:"C = 2╧А├Ч7 = <strong>14╧А тЙИ 43.98</strong>"}]},
{title:"Esercizi geometria piana",tag:"esercizi",esercizi:[{q:"Un quadrato ha area 49. Quanto misura il lato? E il perimetro?",a:"lato = тИЪ49 = 7 тЖТ perimetro = <strong>4├Ч7 = 28</strong>"},{q:"In un triangolo isoscele, i due angoli uguali sono 70┬░. Quanto ├и il terzo angolo?",a:"180┬░ тИТ 70┬░ тИТ 70┬░ = <strong>40┬░</strong>"},{q:"Un cerchio ha area 25╧А. Quanto ├и il raggio?",a:"╧Аr┬▓ = 25╧А тЖТ r┬▓ = 25 тЖТ r = <strong>5</strong>"}]}
]},
{title:"Geometria analitica",lessons:[
{title:"Teoria: rette nel piano cartesiano",tag:"teoria",teoria:`Ogni retta si scrive come <strong>y = mx + q</strong><br>тАв m = pendenza (coefficiente angolare) = ╬Фy/╬Фx<br>тАв q = intercetta (punto dove taglia l'asse y)<br><br><strong>Rette parallele:</strong> stessa pendenza m, q diversa<br><strong>Rette perpendicolari:</strong> mтВБ ├Ч mтВВ = тИТ1<br><br><strong>Distanza tra due punti:</strong> d = тИЪ[(xтВВтИТxтВБ)┬▓ + (yтВВтИТyтВБ)┬▓]<br><strong>Punto medio:</strong> M = ((xтВБ+xтВВ)/2, (yтВБ+yтВВ)/2)`,formule:["y = mx + q","m = (yтВВтИТyтВБ)/(xтВВтИТxтВБ)","d = тИЪ[(xтВВтИТxтВБ)┬▓ + (yтВВтИТyтВБ)┬▓]","M = ((xтВБ+xтВВ)/2, (yтВБ+yтВВ)/2)"],esercizi:[{q:"Che pendenza ha la retta che passa per (1,2) e (3,6)?",a:"m = (6тИТ2)/(3тИТ1) = 4/2 = <strong>2</strong>"},{q:"Distanza tra (0,0) e (3,4)?",a:"d = тИЪ(9+16) = тИЪ25 = <strong>5</strong>"},{q:"Una retta ha pendenza 2. Quale pendenza ha la perpendicolare?",a:"mтВБ├ЧmтВВ=тИТ1 тЖТ 2├ЧmтВВ=тИТ1 тЖТ mтВВ = <strong>тИТ1/2</strong>"}]},
{title:"Teoria: parabola e circonferenza",tag:"teoria",teoria:`<strong>Parabola:</strong> y = ax┬▓ + bx + c<br>тАв Vertice: x_v = тИТb/(2a), y_v = f(x_v)<br>тАв Se a>0: parabola aperta verso l'alto (minimo)<br>тАв Se a<0: parabola aperta verso il basso (massimo)<br><br><strong>Circonferenza:</strong> (xтИТh)┬▓ + (yтИТk)┬▓ = r┬▓<br>тАв Centro: (h,k), Raggio: r<br>тАв Forma generale: x┬▓+y┬▓+Dx+Ey+F=0`,formule:["Vertice parabola: x_v = тИТb/2a","Circonferenza: (xтИТh)┬▓ + (yтИТk)┬▓ = r┬▓"],esercizi:[{q:"Trova il vertice di y = x┬▓ тИТ 4x + 3",a:"x_v = тИТ(тИТ4)/(2├Ч1) = 2 тЖТ y_v = 4тИТ8+3 = тИТ1 тЖТ vertice: <strong>(2, тИТ1)</strong>"},{q:"Qual ├и il centro e raggio di (xтИТ2)┬▓ + (y+1)┬▓ = 9?",a:"Centro: <strong>(2, тИТ1)</strong>, Raggio: <strong>3</strong>"}]}
]},
{title:"Trigonometria",lessons:[
{title:"Teoria: seno, coseno, tangente",tag:"teoria",teoria:`In un triangolo rettangolo con angolo ╬▒:<br>тАв <strong>sin(╬▒)</strong> = cateto opposto / ipotenusa<br>тАв <strong>cos(╬▒)</strong> = cateto adiacente / ipotenusa<br>тАв <strong>tan(╬▒)</strong> = cateto opposto / cateto adiacente = sin/cos<br><br><strong>Valori da memorizzare:</strong><br>╬▒: 0┬░ | 30┬░ | 45┬░ | 60┬░ | 90┬░<br>sin: 0 | 1/2 | тИЪ2/2 | тИЪ3/2 | 1<br>cos: 1 | тИЪ3/2 | тИЪ2/2 | 1/2 | 0<br><br><strong>Identit├а fondamentale:</strong> sin┬▓╬▒ + cos┬▓╬▒ = 1`,formule:["sin┬▓╬▒ + cos┬▓╬▒ = 1","tan ╬▒ = sin ╬▒ / cos ╬▒","sin(30┬░)=1/2, cos(30┬░)=тИЪ3/2","sin(45┬░)=cos(45┬░)=тИЪ2/2","sin(60┬░)=тИЪ3/2, cos(60┬░)=1/2"],esercizi:[{q:"In un triangolo rettangolo, ipotenusa=10, angolo=30┬░. Quanto vale il cateto opposto?",a:"cateto = 10 ├Ч sin(30┬░) = 10 ├Ч 1/2 = <strong>5</strong>"},{q:"Calcola: sin┬▓(60┬░) + cos┬▓(60┬░)",a:"= 3/4 + 1/4 = <strong>1</strong> (sempre vero per identit├а fondamentale)"},{q:"Quanto vale tan(45┬░)?",a:"sin(45┬░)/cos(45┬░) = (тИЪ2/2)/(тИЪ2/2) = <strong>1</strong>"}]},
{title:"Quiz trigonometria",tag:"quiz",esercizi:[{q:"Risolvi: sin(x) = 1/2 per x in [0┬░,360┬░]",a:"x = 30┬░ oppure x = 150┬░ тЖТ <strong>x = 30┬░, 150┬░</strong>"},{q:"Se cos(╬▒) = 3/5, quanto vale sin(╬▒)? (primo quadrante)",a:"sin┬▓╬▒ = 1 тИТ 9/25 = 16/25 тЖТ sin(╬▒) = <strong>4/5</strong>"},{q:"Un triangolo ha angoli 45┬░, 45┬░, 90┬░ e ipotenusa тИЪ2. Quanto valgono i cateti?",a:"cateto = тИЪ2 ├Ч sin(45┬░) = тИЪ2 ├Ч тИЪ2/2 = <strong>1</strong>"}]}
]}
]},
{name:"Funzioni & Statistica",modules:[
{title:"Funzioni: dominio, grafici, trasformazioni",lessons:[
{title:"Teoria: funzioni fondamentali",tag:"teoria",teoria:`Una <strong>funzione</strong> associa a ogni x un unico y.<br><br><strong>Famiglie da conoscere:</strong><br>тАв Lineare: y = mx+q (retta)<br>тАв Quadratica: y = ax┬▓+bx+c (parabola)<br>тАв Valore assoluto: y = |x| (a V)<br>тАв Radice: y = тИЪx (solo xтЙе0)<br>тАв Esponenziale: y = a╦г (sempre >0)<br>тАв Logaritmica: y = log(x) (solo x>0)<br><br><strong>Dominio:</strong> valori di x per cui la funzione ├и definita.<br>тАв Fratta: escludi x che azzerano il denominatore<br>тАв Con radice: imponi l'argomento тЙе 0`,formule:["Dominio di тИЪf(x): f(x) тЙе 0","Dominio di 1/f(x): f(x) тЙа 0","Dominio di log(f(x)): f(x) > 0"],esercizi:[{q:"Qual ├и il dominio di f(x) = тИЪ(xтИТ3)?",a:"xтИТ3 тЙе 0 тЖТ <strong>x тЙе 3</strong>"},{q:"Qual ├и il dominio di f(x) = 1/(x┬▓тИТ4)?",a:"x┬▓тИТ4 тЙа 0 тЖТ xтЙа┬▒2 тЖТ <strong>тДЭ \\ {тИТ2, 2}</strong>"},{q:"La funzione y=2╦г passa per il punto (0, ?) e (1, ?)",a:"x=0: y=2тБ░=1 тЖТ (0,1); x=1: y=2┬╣=2 тЖТ <strong>(0,1) e (1,2)</strong>"}]}
]},
{title:"Statistica e probabilit├а",lessons:[
{title:"Teoria: indici statistici",tag:"teoria",teoria:`<strong>Media aritmetica:</strong> somma dei valori / numero dei valori<br>Dati: 2, 4, 6, 8 тЖТ media = 20/4 = 5<br><br><strong>Mediana:</strong> valore centrale dopo aver ordinato i dati<br>Dati ordinati: 1,3,5,7,9 тЖТ mediana = 5<br>Se pari numero: media dei due centrali<br><br><strong>Moda:</strong> il valore che appare pi├╣ spesso<br>1,2,2,3,4 тЖТ moda = 2<br><br><strong>Probabilit├а:</strong> P(evento) = casi favorevoli / casi totali<br>P sempre tra 0 e 1. P(A)+P(non A)=1`,formule:["Media = ╬гxс╡в / n","P(A) = casi favorevoli / casi totali","P(A) + P(─А) = 1"],esercizi:[{q:"Dati: 3, 7, 5, 9, 1. Calcola media e mediana.",a:"Media=(3+7+5+9+1)/5=25/5=5. Ordine:1,3,5,7,9 тЖТ Mediana=<strong>5</strong>"},{q:"Lancio un dado: probabilit├а di ottenere un numero pari?",a:"Pari={2,4,6}, totale=6 тЖТ P = 3/6 = <strong>1/2</strong>"},{q:"Ho 4 palline rosse e 6 blu. Probabilit├а di estrarne una rossa?",a:"P = 4/10 = <strong>2/5 = 0.4</strong>"}]},
{title:"Simulazione Matematica",tag:"sim",esercizi:[{q:"[SIM 1] Quale dei seguenti ├и il dominio di f(x) = log(x┬▓тИТ1)?",a:"x┬▓тИТ1>0 тЖТ x┬▓>1 тЖТ <strong>x<тИТ1 тИк x>1</strong>"},{q:"[SIM 2] Risolvi il sistema: 2xтИТy=3, x+2y=4",a:"Dalla 1┬к: y=2xтИТ3 тЖТ nella 2┬к: x+2(2xтИТ3)=4 тЖТ 5x=10 тЖТ x=2, y=1 тЖТ <strong>(2,1)</strong>"},{q:"[SIM 3] Trova le intersezioni di y=x┬▓ e y=x+2",a:"x┬▓=x+2 тЖТ x┬▓тИТxтИТ2=0 тЖТ (xтИТ2)(x+1)=0 тЖТ <strong>x=2 (y=4) e x=тИТ1 (y=1)</strong>"},{q:"[SIM 4] Due angoli supplementari sono in rapporto 2:1. Quanto misurano?",a:"2k+k=180┬░ тЖТ k=60┬░ тЖТ <strong>angoli: 120┬░ e 60┬░</strong>"},{q:"[SIM 5] log_4(64) = ?",a:"4^? = 64 = 4┬│ тЖТ <strong>log_4(64) = 3</strong>"}]}
]}
]}
]},
{id:"f2",title:"Fase 2 тАФ Scienze",date:"7 тЖТ 27 Lug",color:"var(--science)",cat:"science",tip:"<strong>Fisica prima di tutto:</strong> vale circa il 70% delle domande di scienze. Studia la fisica con priorit├а, poi la chimica.",subjects:[
{name:"Fisica",modules:[
{title:"Cinematica: il moto",lessons:[
{title:"Teoria: tipi di moto",tag:"teoria",teoria:`<strong>Grandezze:</strong> posizione (m), velocit├а (m/s), accelerazione (m/s┬▓), tempo (s)<br><br><strong>MRU (Moto Rettilineo Uniforme):</strong><br>velocit├а costante, accelerazione = 0<br>Spazio: s = v ├Ч t<br><br><strong>MRUA (Moto Ret. Unif. Accelerato):</strong><br>accelerazione costante a<br>v(t) = vтВА + a├Чt<br>s(t) = vтВАt + ┬╜at┬▓<br>v┬▓ = vтВА┬▓ + 2as<br><br><strong>Caduta libera:</strong> a = g = 9.8 m/s┬▓ verso il basso<br>Da fermo: v = g├Чt, s = ┬╜g├Чt┬▓`,formule:["MRU: s = v┬╖t","MRUA: v = vтВА + at","MRUA: s = vтВАt + ┬╜at┬▓","MRUA: v┬▓ = vтВА┬▓ + 2as","Caduta libera: s = ┬╜gt┬▓ (gтЙИ10 m/s┬▓)"],esercizi:[{q:"Un'auto va a 20 m/s per 10 s. Quanti metri percorre?",a:"s = 20├Ч10 = <strong>200 m</strong>"},{q:"Un oggetto parte da fermo con a=3 m/s┬▓. Dopo 4 s, a che velocit├а va?",a:"v = 0 + 3├Ч4 = <strong>12 m/s</strong>"},{q:"Dalla torre di Pisa (hтЙИ55 m) si lascia cadere una palla. Dopo quanti secondi tocca terra? (g=10)",a:"55 = ┬╜├Ч10├Чt┬▓ тЖТ t┬▓ = 11 тЖТ t тЙИ <strong>3.3 s</strong>"}]}
]},
{title:"Forze ed energia",lessons:[
{title:"Teoria: leggi di Newton",tag:"teoria",teoria:`<strong>1┬к legge (Inerzia):</strong> un corpo rimane in stato di quiete o moto rettilineo uniforme se la forza risultante ├и zero.<br><br><strong>2┬к legge (F=ma):</strong> la forza netta su un corpo = massa ├Ч accelerazione<br>F = ma (unit├а: Newton = kg┬╖m/s┬▓)<br><br><strong>3┬к legge (Azione-Reazione):</strong> per ogni forza c'├и una forza uguale e contraria.<br><br><strong>Peso:</strong> P = m├Чg (forza con cui la Terra attira il corpo)<br><strong>Attrito:</strong> F_a = ╬╝ ├Ч N (╬╝=coeff. attrito, N=forza normale)`,formule:["F = m┬╖a","Peso: P = m┬╖g (gтЙИ9.8 m/s┬▓)","Attrito: FтВР = ╬╝┬╖N"],esercizi:[{q:"Una massa di 5 kg ├и soggetta a F=20 N. Quale accelerazione acquista?",a:"a = F/m = 20/5 = <strong>4 m/s┬▓</strong>"},{q:"Qual ├и il peso di un oggetto da 10 kg? (g=10)",a:"P = 10├Ч10 = <strong>100 N</strong>"},{q:"Un corpo ├и in equilibrio su un piano. La normale ├и 50 N, ╬╝=0.3. Quanto ├и l'attrito massimo?",a:"FтВР = 0.3├Ч50 = <strong>15 N</strong>"}]},
{title:"Teoria: lavoro ed energia",tag:"teoria",teoria:`<strong>Lavoro:</strong> W = F ├Ч d ├Ч cos(╬╕) [Joule = J]<br>╬╕ ├и l'angolo tra forza e spostamento.<br>Se F parallela allo spostamento: W = F├Чd<br><br><strong>Energia cinetica:</strong> Ec = ┬╜mv┬▓<br><strong>Energia potenziale gravitazionale:</strong> Ep = mgh<br><strong>Conservazione energia meccanica:</strong> Ec + Ep = costante (in assenza di attrito)<br><br><strong>Potenza:</strong> P = W/t [Watt = W = J/s]`,formule:["W = F┬╖d┬╖cos ╬╕","Ec = ┬╜mv┬▓","Ep = mgh","Conservazione: EcтВБ + EpтВБ = EcтВВ + EpтВВ","P = W/t"],esercizi:[{q:"Una forza di 10 N sposta un oggetto di 5 m nella stessa direzione. Lavoro compiuto?",a:"W = 10├Ч5├Чcos0┬░ = <strong>50 J</strong>"},{q:"Un oggetto di 2 kg si muove a 3 m/s. Energia cinetica?",a:"Ec = ┬╜├Ч2├Ч9 = <strong>9 J</strong>"},{q:"Una palla di 1 kg ├и a 5 m di altezza. Energia potenziale? (g=10)",a:"Ep = 1├Ч10├Ч5 = <strong>50 J</strong>"}]}
]},
{title:"Termodinamica",lessons:[
{title:"Teoria: calore e gas",tag:"teoria",teoria:`<strong>Temperatura</strong> si misura in ┬░C o Kelvin: K = ┬░C + 273<br><br><strong>Calore Q</strong> [Joule]: Q = m ├Ч c ├Ч ╬ФT (c = calore specifico)<br><br><strong>Gas ideale:</strong> PV = nRT<br>P=pressione, V=volume, n=moli, R=8.31, T=Kelvin<br><br><strong>Leggi dei gas (quantit├а fissa):</strong><br>тАв Boyle (T cost.): PтВБVтВБ = PтВВVтВВ<br>тАв Charles (P cost.): VтВБ/TтВБ = VтВВ/TтВВ<br>тАв Gay-Lussac (V cost.): PтВБ/TтВБ = PтВВ/TтВВ`,formule:["T(K) = T(┬░C) + 273","Q = m┬╖c┬╖╬ФT","Gas ideale: PV = nRT","Boyle: PтВБVтВБ = PтВВVтВВ (T cost.)","Charles: V/T = cost. (P cost.)"],esercizi:[{q:"Un gas ha P=2 atm, V=3 L. A T costante, se V diventa 6 L, che pressione ha?",a:"PтВБVтВБ=PтВВVтВВ тЖТ 2├Ч3=PтВВ├Ч6 тЖТ PтВВ = <strong>1 atm</strong>"},{q:"Converti 100┬░C in Kelvin.",a:"K = 100+273 = <strong>373 K</strong>"},{q:"Quanto calore serve per scaldare 2 kg d'acqua di 10┬░C? (c_acqua=4200 J/kg┬░C)",a:"Q = 2├Ч4200├Ч10 = <strong>84000 J = 84 kJ</strong>"}]}
]},
{title:"Onde ed elettricit├а",lessons:[
{title:"Teoria: onde",tag:"teoria",teoria:`<strong>Parametri di un'onda:</strong><br>тАв Lunghezza d'onda ╬╗ (m)<br>тАв Frequenza f (Hz = 1/s)<br>тАв Velocit├а v (m/s)<br>тАв Relazione fondamentale: v = f ├Ч ╬╗<br><br><strong>Suono:</strong> onda meccanica, vтЙИ340 m/s in aria<br><strong>Luce:</strong> onda elettromagnetica, c=3├Ч10тБ╕ m/s nel vuoto<br><br><strong>Ottica:</strong> riflessione (angolo incidenza = angolo riflessione), rifrazione (Snell: nтВБsin╬╕тВБ = nтВВsin╬╕тВВ)`,formule:["v = f┬╖╬╗","Snell: nтВБ┬╖sin(╬╕тВБ) = nтВВ┬╖sin(╬╕тВВ)","Luce nel vuoto: c = 3├Ч10тБ╕ m/s"],esercizi:[{q:"Un'onda ha f=500 Hz e v=340 m/s. Qual ├и la lunghezza d'onda?",a:"╬╗ = v/f = 340/500 = <strong>0.68 m</strong>"},{q:"Un raggio di luce passa dall'aria (n=1) al vetro (n=1.5) con ╬╕тВБ=30┬░. Trova ╬╕тВВ.",a:"1├Чsin30┬░ = 1.5├Чsin╬╕тВВ тЖТ sin╬╕тВВ=0.5/1.5=1/3 тЖТ ╬╕тВВтЙИ<strong>19.5┬░</strong>"}]},
{title:"Teoria: elettricit├а base",tag:"teoria",teoria:`<strong>Corrente elettrica I</strong> [Ampere A]: flusso di cariche<br><strong>Tensione V</strong> [Volt V]: differenza di potenziale<br><strong>Resistenza R</strong> [Ohm ╬й]<br><br><strong>Legge di Ohm:</strong> V = R ├Ч I<br><br><strong>Resistori in serie:</strong> R_tot = RтВБ + RтВВ + тАж<br><strong>Resistori in parallelo:</strong> 1/R_tot = 1/RтВБ + 1/RтВВ + тАж<br><br><strong>Potenza elettrica:</strong> P = V ├Ч I = R ├Ч I┬▓`,formule:["Ohm: V = R┬╖I","Serie: R_tot = RтВБ+RтВВ","Parallelo: 1/R_tot = 1/RтВБ+1/RтВВ","Potenza: P = V┬╖I"],esercizi:[{q:"Una resistenza da 10 ╬й ├и collegata a 5 V. Che corrente scorre?",a:"I = V/R = 5/10 = <strong>0.5 A</strong>"},{q:"Due resistenze da 4 ╬й e 6 ╬й in serie. Resistenza totale?",a:"R_tot = 4+6 = <strong>10 ╬й</strong>"},{q:"Le stesse due (4 ╬й e 6 ╬й) in parallelo. Resistenza totale?",a:"1/R = 1/4+1/6 = 5/12 тЖТ R = <strong>12/5 = 2.4 ╬й</strong>"}]},
{title:"Simulazione Scienze",tag:"sim",esercizi:[{q:"[SIM 1] Un'auto frena da 30 m/s a 0 in 6 s. Qual ├и la decelerazione?",a:"a = ╬Фv/╬Фt = (0тИТ30)/6 = <strong>тИТ5 m/s┬▓</strong>"},{q:"[SIM 2] Un gas a 300 K e 1 atm viene riscaldato a 600 K a volume costante. Nuova pressione?",a:"PтВБ/TтВБ=PтВВ/TтВВ тЖТ 1/300=PтВВ/600 тЖТ PтВВ = <strong>2 atm</strong>"},{q:"[SIM 3] Un corpo di 3 kg cade da 20 m. A che velocit├а arriva a terra? (g=10, no attrito)",a:"Energia: mgh=┬╜mv┬▓ тЖТ v=тИЪ(2gh)=тИЪ(400) = <strong>20 m/s</strong>"},{q:"[SIM 4] Due cariche hanno forza F a distanza d. Se la distanza raddoppia, la forza diventa?",a:"Coulomb: F тИЭ 1/d┬▓ тЖТ d├Ч2 тЖТ F diventa <strong>F/4</strong>"}]}
]}
]},
{name:"Chimica",modules:[
{title:"Atomo e tavola periodica",lessons:[
{title:"Teoria: struttura atomica",tag:"teoria",teoria:`<strong>Atomo</strong> = nucleo (protoni + neutroni) + elettroni intorno<br><br>тАв <strong>Numero atomico Z</strong> = numero di protoni (identifica l'elemento)<br>тАв <strong>Numero di massa A</strong> = protoni + neutroni<br>тАв Neutroni = A тИТ Z<br>тАв In atomo neutro: elettroni = protoni<br><br><strong>Tavola periodica:</strong><br>тАв Periodi (righe): stessi gusci elettronici<br>тАв Gruppi (colonne): stesse propriet├а chimiche<br>тАв Metalli (sinistra), non-metalli (destra), semimetalli (diagonale)`,formule:["Neutroni = A тИТ Z","Ione positivo (catione): perde elettroni","Ione negativo (anione): acquista elettroni"],esercizi:[{q:"Il carbonio ha Z=6, A=12. Quanti neutroni ha?",a:"Neutroni = 12тИТ6 = <strong>6</strong>"},{q:"Un atomo di Na (Z=11) perde 1 elettrone. Che carica ha?",a:"Diventa NaтБ║, <strong>catione con carica +1</strong>"},{q:"Dove si trovano i gas nobili nella tavola periodica?",a:"<strong>Gruppo 18</strong> (colonna pi├╣ a destra)"}]}
]},
{title:"Legami e reazioni chimiche",lessons:[
{title:"Teoria: legami e moli",tag:"teoria",teoria:`<strong>Legami chimici:</strong><br>тАв <strong>Ionico:</strong> trasferimento di eтБ╗ (metallo+non-metallo, es. NaCl)<br>тАв <strong>Covalente:</strong> condivisione di eтБ╗ (non-metallo+non-metallo, es. HтВВO)<br>тАв <strong>Metallico:</strong> eтБ╗ liberi (metalli puri)<br><br><strong>Mole:</strong> 6.022├Ч10┬▓┬│ particelle (numero di Avogadro N_A)<br>Massa molare M = massa in grammi di 1 mole<br>n (moli) = massa (g) / M (g/mol)<br><br><strong>Bilanciamento:</strong> gli atomi si conservano тЖТ il numero di atomi di ogni elemento deve essere uguale a destra e sinistra.`,formule:["n = m / M  (n=moli, m=massa in g, M=massa molare)","N_A = 6.022├Ч10┬▓┬│","Reazione bilanciata: atomi conservati"],esercizi:[{q:"Quante moli ci sono in 36 g di acqua? (M_HтВВO = 18 g/mol)",a:"n = 36/18 = <strong>2 moli</strong>"},{q:"Bilancia: HтВВ + OтВВ тЖТ HтВВO",a:"<strong>2HтВВ + OтВВ тЖТ 2HтВВO</strong>"},{q:"NaCl ├и un legame ionico o covalente?",a:"<strong>Ionico</strong> (Na ├и metallo, Cl ├и non-metallo)"}]},
{title:"Acidi, basi e pH",tag:"teoria",teoria:`<strong>Acidi:</strong> donano HтБ║ in soluzione (es. HCl, HтВВSOтВД)<br><strong>Basi:</strong> accettano HтБ║ / donano OHтБ╗ (es. NaOH)<br><br><strong>pH = тИТlog[HтБ║]</strong><br>тАв pH < 7 тЖТ acido<br>тАв pH = 7 тЖТ neutro (acqua pura)<br>тАв pH > 7 тЖТ basico (alcalino)<br><br><strong>Neutralizzazione:</strong> acido + base тЖТ sale + acqua<br>HCl + NaOH тЖТ NaCl + HтВВO`,formule:["pH = тИТlog[HтБ║]","pH + pOH = 14","Neutralizzazione: acido + base тЖТ sale + HтВВO"],esercizi:[{q:"Una soluzione ha [HтБ║]=10тБ╗┬│ mol/L. Qual ├и il pH?",a:"pH = тИТlog(10тБ╗┬│) = <strong>3</strong> (acido)"},{q:"pH = 11: acido, neutro o basico?",a:"pH > 7 тЖТ <strong>basico</strong>"},{q:"Quali prodotti si formano da HтВВSOтВД + 2NaOH?",a:"<strong>NaтВВSOтВД + 2HтВВO</strong>"}]}
]}
]}
]},
{id:"f3",title:"Fase 3 тАФ Logica & Comprensione verbale",date:"28 Lug тЖТ 17 Ago",color:"var(--logic)",cat:"logic",tip:"<strong>Nessuna teoria da memorizzare.</strong> Allena il ragionamento con tanti esempi. Per la comprensione verbale: leggi la domanda PRIMA del testo.",subjects:[
{name:"Ragionamento Logico",modules:[
{title:"Serie numeriche",lessons:[
{title:"Teoria: riconoscere pattern",tag:"teoria",teoria:`Una serie numerica segue sempre una regola. Devi trovarla.<br><br><strong>Tipi comuni:</strong><br>тАв Aritmetica: aggiungi sempre lo stesso numero (2, 5, 8, 11тАж) тЖТ +3<br>тАв Geometrica: moltiplica sempre per lo stesso (2, 6, 18, 54тАж) тЖТ ├Ч3<br>тАв Quadrati/cubi: 1, 4, 9, 16, 25тАж (n┬▓)<br>тАв Fibonacci: ogni termine = somma dei due precedenti (1,1,2,3,5,8тАж)<br>тАв Alternata: due regole che si alternano (2,6,4,12,6,18тАж)<br><br><strong>Strategia:</strong> calcola le differenze tra termini consecutivi. Se le differenze sono costanti тЖТ aritmetica. Se le differenze crescono тЖТ prova divisioni.`,formule:["Serie aritm.: aтВЩ = aтВБ + (nтИТ1)d","Serie geom.: aтВЩ = aтВБ ├Ч rтБ┐тБ╗┬╣"],esercizi:[{q:"Trova il prossimo: 3, 7, 11, 15, ?",a:"Differenza +4 тЖТ <strong>19</strong>"},{q:"Trova il prossimo: 2, 6, 18, 54, ?",a:"Rapporto ├Ч3 тЖТ <strong>162</strong>"},{q:"Trova il prossimo: 1, 4, 9, 16, ?",a:"Quadrati (n┬▓): 1┬▓,2┬▓,3┬▓,4┬▓ тЖТ <strong>25 (5┬▓)</strong>"},{q:"Trova il prossimo: 1, 1, 2, 3, 5, 8, ?",a:"Fibonacci: ogni termine = somma dei due precedenti тЖТ <strong>13</strong>"},{q:"Trova il prossimo: 3, 6, 5, 10, 9, 18, 17, ?",a:"Alternanza: ├Ч2, тИТ1, ├Ч2, тИТ1тАж тЖТ 17├Ч2 = <strong>34</strong>"}]}
]},
{title:"Sillogismi e deduzione",lessons:[
{title:"Teoria: ragionamento logico formale",tag:"teoria",teoria:`<strong>Sillogismo:</strong> da due premesse si trae una conclusione.<br>Premessa 1: Tutti i cani sono animali.<br>Premessa 2: Rex ├и un cane.<br>Conclusione: Rex ├и un animale. тЬУ<br><br><strong>Attenzione alle trappole:</strong><br>тАв "Alcuni A sono B" тЙа "Tutti A sono B"<br>тАв "Nessun A ├и B" тЖТ "Nessun B ├и A" (├и simmetrica)<br>тАв Non confondere la direzione: "Se piove тЖТ prenditi l'ombrello" NON implica "se prendo l'ombrello тЖТ piove"<br><br><strong>Contrapposizione (valida):</strong> "Se A тЖТ B" equivale a "Se non B тЖТ non A"`,formule:["Se AтЖТB e BтЖТC, allora AтЖТC (transitivit├а)","Se AтЖТB, allora ┬мBтЖТ┬мA (contrapposizione)","┬м(A e B) = ┬мA o ┬мB (De Morgan)"],esercizi:[{q:"Tutti gli studenti di ingegneria studiano matematica. Marco studia matematica. Marco ├и uno studente di ingegneria?",a:"<strong>Non necessariamente.</strong> Matematica la possono studiare anche altri (errore logico comune)."},{q:"Nessun pesce pu├▓ volare. Il salmone ├и un pesce. Conclusione?",a:"<strong>Il salmone non pu├▓ volare.</strong> тЬУ"},{q:"Se ha studiato, allora supera l'esame. Non supera l'esame. Conclusione?",a:"Per contrapposizione: <strong>non ha studiato.</strong> тЬУ"}]}
]},
{title:"Problemi logici e insiemi",lessons:[
{title:"Esercizi: problemi di ragionamento",tag:"esercizi",esercizi:[{q:"In una gara, Anna arriva prima di Luca. Luca arriva prima di Marco. Chi arriva ultimo?",a:"Anna > Luca > Marco тЖТ <strong>Marco</strong>"},{q:"Tutti i rossi sono grandi. Alcune cose grandi sono pesanti. Possiamo concludere che alcuni rossi sono pesanti?",a:"<strong>Non necessariamente</strong> тАФ i rossi grandi potrebbero essere proprio quelli che non sono pesanti."},{q:"In una classe di 30, 18 studiano inglese, 15 francese e 8 entrambe. Quanti non studiano nessuna delle due?",a:"Inglese тИк Francese = 18+15тИТ8 = 25 тЖТ nessuna delle due = 30тИТ25 = <strong>5</strong>"},{q:"Tre fratelli hanno rispettivamente 2, 3 e 5 anni in pi├╣ l'uno dell'altro. Il maggiore ha 20 anni. Quanti anni ha il minore?",a:"20 тИТ 3 тИТ 5 = <strong>12 anni</strong>"},{q:"Se LUNA si codifica OXSF, come si codifica SOLE?",a:"LтЖТO(+3), UтЖТX(+3), NтЖТS(+5?). Controlla: L=12тЖТO=15(+3), U=21тЖТX=24(+3), N=14тЖТS=19(+5). Non ├и costante тАФ prova +3: S=19тЖТV, O=15тЖТR, L=12тЖТO, E=5тЖТH тЖТ <strong>VROH</strong> (schema +3)"}]},
{title:"Simulazione Logica",tag:"sim",esercizi:[{q:"[SIM 1] Serie: 2, 3, 5, 8, 13, 21, ?",a:"Fibonacci тЖТ <strong>34</strong>"},{q:"[SIM 2] Tutti i pianeti orbitano attorno a una stella. La Terra orbita attorno al Sole. Conclusione valida?",a:"S├м: <strong>la Terra ├и un pianeta</strong> (se si assume che 'orbitare attorno a una stella' sia condizione sufficiente)."},{q:"[SIM 3] 100 persone: 60 parlano inglese, 50 francese, 30 entrambe. Quante non parlano nessuna?",a:"60+50тИТ30=80 тЖТ 100тИТ80 = <strong>20 persone</strong>"},{q:"[SIM 4] Trova il prossimo: 1, 8, 27, 64, ?",a:"Cubi: 1┬│, 2┬│, 3┬│, 4┬│ тЖТ <strong>125 (5┬│)</strong>"}]}
]}
]},
{name:"Comprensione Verbale",modules:[
{title:"Tecniche di lettura e analogie",lessons:[
{title:"Teoria: come affrontare la comprensione verbale",tag:"teoria",teoria:`<strong>Tipologie di domande:</strong><br>1. Comprensione del testo: "Cosa afferma l'autore riguardo aтАж?"<br>2. Inferenze: "Quale conclusione si pu├▓ trarre?"<br>3. Analogie verbali: "Caldo : Freddo = Luce : ?"<br>4. Significato di parole dal contesto<br><br><strong>Strategia per i testi:</strong><br>1. Leggi prima la domanda<br>2. Scorri il testo cercando l'informazione rilevante<br>3. La risposta corretta spesso parafrasava il testo, non lo cita letteralmente<br>4. Diffida delle risposte che vanno "oltre" quello che dice il testo<br><br><strong>Analogie verbali:</strong> trova la relazione tra le prime due parole e applicala.<br>Caldo:Freddo = Giorno:Notte тЖТ entrambe coppie di <em>opposti</em>`,formule:["Analogia: A:B = C:D тЖТ trova la stessa relazione","Inferenza: basati solo su quanto detto nel testo"],esercizi:[{q:"LIBRO : BIBLIOTECA = QUADRO : ?",a:"Un libro sta in una biblioteca, un quadro sta in un <strong>museo</strong>."},{q:"MEDICO : OSPEDALE = CUOCO : ?",a:"Il medico lavora in ospedale, il cuoco lavora in <strong>cucina / ristorante</strong>."},{q:"ACQUA : SETE = CIBO : ?",a:"L'acqua placa la sete, il cibo placa la <strong>fame</strong>."},{q:"PAGINA : LIBRO = MATTONE : ?",a:"La pagina ├и parte del libro, il mattone ├и parte del <strong>muro / edificio</strong>."}]},
{title:"Simulazione Verbale",tag:"sim",esercizi:[{q:"[SIM] SILENZIO : RUMORE = IMMOBILIT├А : ?",a:"Contrari тЖТ <strong>MOVIMENTO</strong>"},{q:"[SIM] PITTORE : PENNELLO = SCRITTORE : ?",a:"Strumento del mestiere тЖТ <strong>PENNA / TASTIERA</strong>"},{q:"[SIM] Testo: 'Le energie rinnovabili crescono ma restano sotto il 30% del mix energetico mondiale.' Quale conclusione si pu├▓ trarre?",a:"<strong>Le energie non rinnovabili rappresentano ancora oltre il 70% del mix energetico.</strong> (diretto dal testo)"}]}
]}
]}

{title:"Formulario rapido matematica",tag:"teoria",teoria:`<strong>MINI-FORMULARIO DA RIPASSARE L'ULTIMA SETTIMANA</strong><br><br>Equazione 2┬░ grado: x = (тИТb ┬▒ тИЪ(b┬▓тИТ4ac)) / 2a<br>Pitagora: a┬▓+b┬▓=c┬▓<br>Area cerchio: ╧Аr┬▓ | Circonferenza: 2╧Аr<br>Pendenza retta: m=(yтВВтИТyтВБ)/(xтВВтИТxтВБ)<br>sin┬▓+cos┬▓=1<br>log(ab)=log a + log b<br>aс╡Р├ЧaтБ┐=aс╡РтБ║тБ┐<br>Media=╬гx/n | P(A)=fav/tot<br><br><strong>FISICA:</strong><br>s=vt | v=vтВА+at | s=vтВАt+┬╜at┬▓<br>F=ma | P=mg | W=Fd | Ec=┬╜mv┬▓<br>V=RI | P=VI<br>v=f╬╗<br><br><strong>CHIMICA:</strong><br>n=m/M | pH=тИТlog[HтБ║] | PV=nRT`,formule:[],esercizi:[{q:"Ripasso rapido: formula quadratica?",a:"x = (тИТb ┬▒ тИЪ(b┬▓тИТ4ac)) / 2a"},{q:"Ripasso rapido: legge di Ohm?",a:"V = R ├Ч I"},{q:"Ripasso rapido: energia cinetica?",a:"Ec = ┬╜mv┬▓"},{q:"Ripasso rapido: identit├а trigonometrica fondamentale?",a:"sin┬▓╬▒ + cos┬▓╬▒ = 1"}]}

function build(){
  const root=document.getElementById('root');
  PHASES.forEach(ph=>{
    const pd=document.createElement('div');
    pd.className='phase';
    pd.id=ph.id;
    let subHTML='';
    ph.subjects.forEach((sub,si)=>{
      let modHTML='';
      sub.modules.forEach((mod,mi)=>{
        let lesHTML='';
        mod.lessons.forEach((les,li)=>{
          const key=`${ph.id}-${si}-${mi}-${li}`;
          const ck=ls(key);
          let inner='';
          if(les.teoria){
            inner+=`<div class="content-block"><div class="cb-label">ЁЯУЦ Spiegazione</div><div class="teoria-text">${les.teoria}</div></div>`;
          }
          if(les.formule && les.formule.length){
            inner+=`<div class="content-block"><div class="cb-label">ЁЯУР Formule chiave</div><div class="formula-box">${les.formule.join('<br>')}</div></div>`;
          }
          if(les.esercizi && les.esercizi.length){
            inner+=`<div class="content-block"><div class="cb-label">тЬПя╕П ${les.tag==='sim'?'Simulazione':'Esercizi'}</div><div class="esercizi-list">`;
            les.esercizi.forEach((ez,ei)=>{
              inner+=`<div class="esercizio">
                <div class="ez-q" onclick="toggleAnswer('ea-${key}-${ei}',this)">
                  <span class="ez-num">${String(ei+1).padStart(2,'0')}</span>
                  <span class="ez-text">${ez.q}</span>
                  <span class="ez-reveal">тЦ╛ risposta</span>
                </div>
                <div class="ez-answer" id="ea-${key}-${ei}">
                  <div class="answer-label">тЬУ Soluzione</div>
                  <div class="answer-text">${ez.a}</div>
                </div>
              </div>`;
            });
            inner+='</div></div>';
          }
          lesHTML+=`<div class="lesson" id="les-${key}">
            <div class="lesson-top" onclick="toggleLesson('${key}',this)">
              <div class="les-check ${ck?'checked':''}" id="lc-${key}"></div>
              <div class="les-info"><div class="les-title ${ck?'done':''}" id="lt-${key}">${les.title}</div></div>
              <span class="les-tag tag-${les.tag}">${les.tag}</span>
            </div>
            <div class="les-content" id="lcont-${key}">${inner}</div>
          </div>`;
        });
        const mk=`mod-${ph.id}-${si}-${mi}`;
        const allDone=mod.lessons.every((_,li)=>ls(`${ph.id}-${si}-${mi}-${li}`));
        modHTML+=`<div class="module" id="${mk}">
          <div class="mod-hdr" onclick="toggleMod('${mk}',this)">
            <div class="mod-check ${allDone?'checked':''}" id="mc-${mk}"></div>
            <div class="mod-title ${allDone?'done':''}" id="mt-${mk}">${mod.title}</div>
            <div class="mod-chev" id="mch-${mk}">тЦ╛</div>
          </div>
          <div class="lessons" id="ml-${mk}">${lesHTML}</div>
        </div>`;
      });
      subHTML+=`<div class="subj-group">
        <div class="subj-hdr">
          <div class="subj-bar" style="background:${ph.color}"></div>
          <div class="subj-name">${sub.name}</div>
          <div class="subj-prog" id="sp-${ph.id}-${si}">0/${sub.modules.reduce((a,m)=>a+m.lessons.length,0)}</div>
        </div>
        ${modHTML}
      </div>`;
    });
    pd.innerHTML=`
      <div class="phase-hdr" id="ph-${ph.id}" onclick="togglePhase('${ph.id}',this)">
        <div class="phase-left">
          <div class="phase-dot" style="background:${ph.color}"></div>
          <div class="phase-title">${ph.title}</div>
        </div>
        <div class="phase-meta">
          <div class="phase-date">${ph.date}</div>
          <div class="phase-pct" id="pp-${ph.id}">0%</div>
          <div class="chevron">тЦ╛</div>
        </div>
      </div>
      <div class="phase-body" id="pb-${ph.id}">
        ${subHTML}
        ${ph.tip?`<div class="tip-box">${ph.tip}</div>`:''}
      </div>`;
    root.appendChild(pd);
  });
  updateAll();
}

function ls(key){return localStorage.getItem(key)==='1';}

function togglePhase(id,hdr){
  const b=document.getElementById('pb-'+id);
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  hdr.classList.toggle('open',!open);
}

function toggleMod(mk,hdr){
  const lessons=document.getElementById('ml-'+mk);
  const chev=document.getElementById('mch-'+mk);
  const open=lessons.classList.contains('open');
  lessons.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

function toggleLesson(key,el){
  // open/close content
  const cont=document.getElementById('lcont-'+key);
  const contOpen=cont.classList.contains('open');
  // if clicking the checkbox area
  const ck=ls(key);
  const newVal=ck?'0':'1';
  localStorage.setItem(key,newVal);
  document.getElementById('lc-'+key).classList.toggle('checked',newVal==='1');
  document.getElementById('lt-'+key).classList.toggle('done',newVal==='1');
  // toggle content only if not already open or if marking done
  if(!contOpen){
    cont.classList.add('open');
  }
  updateAll();
  updateModChecks();
}

function toggleAnswer(id,el){
  const ans=document.getElementById(id);
  const open=ans.classList.contains('open');
  ans.classList.toggle('open',!open);
  const rev=el.querySelector('.ez-reveal');
  if(rev) rev.textContent=open?'тЦ╛ risposta':'тЦ┤ nascondi';
}

function updateModChecks(){
  PHASES.forEach(ph=>{
    ph.subjects.forEach((sub,si)=>{
      sub.modules.forEach((mod,mi)=>{
        const mk=`mod-${ph.id}-${si}-${mi}`;
        const allDone=mod.lessons.every((_,li)=>ls(`${ph.id}-${si}-${mi}-${li}`));
        const mc=document.getElementById('mc-'+mk);
        const mt=document.getElementById('mt-'+mk);
        if(mc) mc.classList.toggle('checked',allDone);
        if(mt) mt.classList.toggle('done',allDone);
      });
    });
  });
}

function updateAll(){
  let tot=0,don=0;
  const cats={math:{t:0,d:0},science:{t:0,d:0},logic:{t:0,d:0},sim:{t:0,d:0}};
  PHASES.forEach(ph=>{
    let pt=0,pd_=0;
    ph.subjects.forEach((sub,si)=>{
      let st=0,sd=0;
      sub.modules.forEach((mod,mi)=>{
        mod.lessons.forEach((_,li)=>{
          const key=`${ph.id}-${si}-${mi}-${li}`;
          tot++;pt++;st++;
          cats[ph.cat].t++;
          if(ls(key)){don++;pd_++;sd++;cats[ph.cat].d++;}
        });
      });
      const sp=document.getElementById(`sp-${ph.id}-${si}`);
      if(sp) sp.textContent=`${sd}/${st}`;
    });
    const pct=pt>0?Math.round(pd_/pt*100):0;
    const pp=document.getElementById('pp-'+ph.id);
    if(pp) pp.textContent=pct+'%';
  });
  const gp=tot>0?Math.round(don/tot*100):0;
  document.getElementById('total-cnt').textContent=`${don} / ${tot}`;
  document.getElementById('total-bar').style.width=gp+'%';
  ['math','science','logic','sim'].forEach(c=>{
    const pct=cats[c].t>0?Math.round(cats[c].d/cats[c].t*100):0;
    const pe=document.getElementById('pct-'+c);
    const be=document.getElementById('bar-'+c);
    if(pe) pe.textContent=pct+'%';
    if(be) be.style.width=pct+'%';
  });
}

function resetAll(){
  if(!confirm('Azzerare tutto il progresso? Non si pu├▓ annullare.')) return;
  localStorage.clear();
  location.reload();
}

build();
</script>
